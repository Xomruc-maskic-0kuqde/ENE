<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Reset password — ENE</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f48003'/%3E%3Ctext x='50%25' y='54%25' font-family='-apple-system,Inter,sans-serif' font-size='34' font-weight='800' text-anchor='middle' dominant-baseline='middle' fill='%230a0a14'%3EE%3C/text%3E%3C/svg%3E">
  <script src="assets/config.js?v=1776533472"></script>
  <script src="assets/sanitize.js?v=1776533472"></script>
  <script src="assets/api.js?v=1776533472"></script>
  <script src="assets/patterns.js?v=1776533472"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css?v=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-0: #050514; --bg-1: #08081f;
      --surface: #0e0e2c; --surface-2: #14143a;
      --line-2: rgba(255, 255, 255, 0.14);
      --accent: #f48003; --accent-2: #ff9a2e; --accent-soft: rgba(244, 128, 3, 0.18);
      --text: #f5f5fa; --text-muted: rgba(245, 245, 250, 0.45); --text-soft: rgba(245, 245, 250, 0.72);
      --error: #ff7a7a; --ok: #15c7bc;
    }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(900px 500px at 85% -5%, rgba(244, 128, 3, 0.10), transparent 60%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    h1 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; font-size: 1.6rem; text-align: center; margin-bottom: 4px; }
    .card {
      position: relative; width: 100%; max-width: 440px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line-2); border-radius: 6px;
      padding: 44px 36px 32px;
    }
    .card > span.br {
      position: absolute; width: 14px; height: 14px;
      border: 2px solid var(--accent); pointer-events: none;
    }
    .br-tl { top:-1px; left:-1px; border-right:none; border-bottom:none; }
    .br-tr { top:-1px; right:-1px; border-left:none; border-bottom:none; }
    .br-bl { bottom:-1px; left:-1px; border-right:none; border-top:none; }
    .br-br { bottom:-1px; right:-1px; border-left:none; border-top:none; }
    .sub {
      color: var(--text-muted); text-align: center;
      margin-bottom: 28px; font-size: 0.78rem; letter-spacing: 0.18em;
      text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    }
    form { display: flex; flex-direction: column; gap: 18px; }
    label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; color: var(--text-soft);
      margin-bottom: 8px; display: block;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    label::before { content: "[ "; color: var(--accent); }
    label::after  { content: " ]"; color: var(--accent); }
    input {
      width: 100%; padding: 12px 0 11px;
      background: transparent; border: none;
      border-bottom: 1px solid var(--line-2);
      color: var(--text); font-size: 1rem; font-family: inherit;
    }
    input:focus { outline: none; border-bottom-color: var(--accent); box-shadow: 0 1px 0 0 var(--accent); }
    .hint { font-family: 'JetBrains Mono', monospace; font-size: .7rem; color: var(--text-muted); margin-top: 8px; }
    button.primary {
      background: var(--accent); color: #0a0a14; border: none;
      padding: 14px; border-radius: 4px; font-weight: 700; font-size: .85rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: .16em; text-transform: uppercase; cursor: pointer;
      margin-top: 14px;
    }
    button.primary:hover:not(:disabled) { background: var(--accent-2); }
    button.primary:disabled { opacity: .55; cursor: not-allowed; }
    .msg {
      padding: 11px 13px; border-radius: 4px; font-size: .85rem;
      margin-bottom: 16px; display: none; line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
      border-left: 3px solid transparent;
    }
    .msg.show { display: block; }
    .msg.error { background: rgba(255,90,90,.08); border-left-color: var(--error); color: var(--error); }
    .msg.ok    { background: rgba(21,199,188,.08); border-left-color: var(--ok);    color: var(--ok); }
    .alt {
      text-align: center; margin-top: 26px; padding-top: 18px;
      border-top: 1px dashed var(--line-2);
      font-size: .78rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .alt a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .alt a:hover { color: var(--accent-2); }
    .skip-link{position:absolute;left:-9999px;top:8px;z-index:99999;background:#f48003;color:#0a0a14;padding:10px 18px;border-radius:8px;font-family:system-ui,sans-serif;font-weight:700;font-size:.8rem;text-decoration:none}
    .skip-link:focus{left:12px}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <main class="card" id="main-content" tabindex="-1">
    <span class="br br-tl" aria-hidden="true"></span>
    <span class="br br-tr" aria-hidden="true"></span>
    <span class="br br-bl" aria-hidden="true"></span>
    <span class="br br-br" aria-hidden="true"></span>

    <h1>Set a new password</h1>
    <p class="sub">Choose something strong</p>

    <div id="msg" class="msg" role="alert" aria-live="polite" data-msg></div>

    <form id="form" novalidate>
      <!-- Hidden username field for password manager autofill association. -->
      <input type="email" id="usernameHidden" name="username" autocomplete="username" aria-hidden="true" tabindex="-1" style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0">
      <div>
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="72" />
        <p class="hint">Min. 8 characters · avoid common passwords</p>
      </div>
      <div>
        <label for="confirm">Confirm password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" required minlength="8" maxlength="72" />
      </div>
      <button type="submit" class="primary" id="btn">Reset password</button>
    </form>

    <p class="alt"><a href="login.html">← Back to sign in</a></p>
  </main>

  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token') || '';

    if (!token) {
      msg.textContent = 'This reset link is missing its token. Request a new email.';
      msg.className = 'msg show error';
      document.getElementById('btn').disabled = true;
    }

    Patterns.ready(() => {
      const f = Patterns.form(form, {
        loadingText: 'Resetting…',
        idleText: 'Reset password',
        read: () => ({
          password: document.getElementById('password').value,
          confirm:  document.getElementById('confirm').value,
        }),
        validate: ({ password, confirm }) => {
          if (!password || password.length < 8) return 'Password must be at least 8 characters.';
          if (password !== confirm) return 'Passwords do not match.';
          return null;
        },
        submit: async ({ values }) => api.post('/auth/reset-password', { token, password: values.password }),
        onSuccess: () => {
          msg.textContent = 'Password reset. Taking you to sign in…';
          msg.className = 'msg show ok';
          setTimeout(() => { window.location.href = 'login.html'; }, 900);
        },
        onError: (err) => {
          const s = err && err.status;
          let text = (err && err.message) || 'Could not reset password.';
          if (s === 429) text = 'Too many reset attempts. Please try again later.';
          else if (s === 0) text = "We can't reach the service right now. Please try again in a moment.";
          f.setError(text);
        },
      });
    });
  </script>
</body>
</html>
