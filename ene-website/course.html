<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Course — ENE</title>
  <meta name="description" content="Your ENE course — lessons, progress, video content.">
  <meta name="robots" content="noindex">
  <script src="assets/config.js?v=1776533472"></script>
  <script src="assets/sanitize.js?v=1776533472"></script>
  <script src="assets/api.js?v=1776533472"></script>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f48003'/%3E%3Ctext x='50%25' y='54%25' font-family='-apple-system,Inter,sans-serif' font-size='34' font-weight='800' text-anchor='middle' dominant-baseline='middle' fill='%230a0a14'%3EE%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-0: #050514;
      --bg-1: #08081f;
      --surface: #0e0e2c;
      --surface-2: #14143a;
      --line: rgba(255, 255, 255, 0.07);
      --line-2: rgba(255, 255, 255, 0.14);
      --accent: #f48003;
      --accent-2: #ff9a2e;
      --accent-soft: rgba(244, 128, 3, 0.18);
      --green: #4ade80;
      --green-soft: rgba(74, 222, 128, 0.14);
      --text: #f5f5fa;
      --text-soft: rgba(245, 245, 250, 0.78);
      --text-muted: rgba(245, 245, 250, 0.52);
      --text-dim: rgba(245, 245, 250, 0.35);
      --error: #ff7a7a;
      --sidebar-w: 340px;
    }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(900px 500px at 95% 0%, rgba(244, 128, 3, 0.05), transparent 60%),
        radial-gradient(900px 600px at -10% 100%, rgba(50, 50, 200, 0.10), transparent 60%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; }

    /* ── Top navbar ─────────────────────────────────────────── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(8, 8, 31, 0.78);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--line-2);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .brand img {
      height: 76px;
      width: auto;
      display: block;
      filter: drop-shadow(0 10px 26px rgba(244, 128, 3, 0.38)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
      transition: filter 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .brand:hover img {
      transform: scale(1.04);
      filter: drop-shadow(0 14px 32px rgba(244, 128, 3, 0.48)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }
    .crumb {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 4px 10px;
      border-left: 1px solid var(--line-2);
      margin-left: 4px;
    }
    .crumb a:hover { color: var(--accent); }
    .nav-spacer { flex: 1; }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--line-2);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-soft);
      transition: border-color 200ms, color 200ms, background-color 200ms;
    }
    .back-link:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(244, 128, 3, 0.06);
    }

    /* ── Two-pane layout ──────────────────────────────────────
       96px navbar = 10px pad + 76px logo + 10px pad */
    .layout {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      min-height: calc(100vh - 96px);
    }

    /* ── Sidebar (lessons list) ─────────────────────────────── */
    .sidebar {
      border-right: 1px solid var(--line-2);
      background: rgba(14, 14, 44, 0.55);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
      padding: 22px 18px 28px;
      overflow-y: auto;
      max-height: calc(100vh - 96px);
      position: sticky;
      top: 96px;
    }
    .course-meta-box {
      padding-bottom: 18px;
      border-bottom: 1px dashed var(--line-2);
      margin-bottom: 16px;
    }
    .course-cat {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .course-name {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 6px;
    }
    .course-instructor-side {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .progress-summary {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .progress-summary strong { color: var(--accent); font-weight: 700; }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      transition: width 600ms cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 12px var(--accent-soft);
    }

    .lesson-section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: 6px 10px;
      margin-top: 8px;
    }
    .lesson-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .lesson-row {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 10px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-soft);
      transition: background-color 150ms, color 150ms;
      border: 1px solid transparent;
    }
    .lesson-row:hover { background: rgba(255, 255, 255, 0.04); }
    .lesson-row.active {
      background: linear-gradient(90deg, rgba(244, 128, 3, 0.22), rgba(244, 128, 3, 0.10));
      color: var(--accent);
      border-color: rgba(244, 128, 3, 0.42);
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .lesson-row.active .lesson-text .lesson-title { font-weight: 600; }
    .lesson-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--line-2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 150ms, background-color 150ms;
    }
    .lesson-check svg { width: 12px; height: 12px; opacity: 0; transition: opacity 150ms; }
    .lesson-row.completed .lesson-check {
      background: var(--green);
      border-color: var(--green);
      color: #0a0a14;
    }
    .lesson-row.completed .lesson-check svg { opacity: 1; }
    .lesson-row.active .lesson-check { border-color: var(--accent); }
    .lesson-text {
      font-size: 0.9rem;
      line-height: 1.4;
      min-width: 0;
    }
    .lesson-text .lesson-title {
      font-weight: 500;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }
    .lesson-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      flex-shrink: 0;
    }

    /* ── Main lesson area ───────────────────────────────────── */
    .main {
      padding: 32px 36px 60px;
      max-width: 960px;
    }
    .lesson-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .lesson-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .lesson-h1 {
      font-size: clamp(1.5rem, 2.6vw, 1.95rem);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .lesson-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Video player ───────────────────────────────────────── */
    .video-wrap {
      position: relative;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--line-2);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 60px -28px rgba(0, 0, 0, 0.55);
      margin-bottom: 24px;
    }
    .video-wrap iframe,
    .video-wrap video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background:
        radial-gradient(circle at 50% 35%, rgba(244, 128, 3, 0.08), transparent 60%),
        linear-gradient(180deg, var(--surface), #050514);
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
    }
    .video-placeholder .play-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(244, 128, 3, 0.12);
      border: 1px solid var(--accent-soft);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
    }
    .video-placeholder .play-icon svg { width: 24px; height: 24px; margin-left: 3px; }

    /* ── Lesson content + actions ───────────────────────────── */
    .content-card {
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line-2);
      border-radius: 12px;
      padding: 26px 28px;
      margin-bottom: 20px;
    }
    .content-card h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--line-2);
      font-weight: 600;
    }
    .content-card h2::before { content: "// "; opacity: 0.6; }
    .content-card .lesson-content {
      font-size: 0.98rem;
      line-height: 1.75;
      color: rgba(245, 245, 250, 0.88);
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .content-card .lesson-content em {
      color: var(--text-muted);
      font-style: italic;
      display: block;
      padding: 6px 0;
    }

    .actions-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    .btn-primary {
      padding: 13px 22px;
      border: none;
      background: var(--accent);
      color: #0a0a14;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background-color 200ms, box-shadow 200ms, transform 100ms;
      box-shadow: 0 0 0 1px var(--accent), 0 8px 24px -10px var(--accent-soft);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--accent-2);
      box-shadow: 0 0 0 1px var(--accent-2), 0 12px 28px -10px rgba(244, 128, 3, 0.55);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(1px); }
    .btn-primary:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(244, 128, 3, 0.35); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
    .btn-primary.completed {
      background: var(--green-soft);
      color: var(--green);
      box-shadow: 0 0 0 1px rgba(74, 222, 128, 0.35);
    }
    .btn-primary svg { width: 14px; height: 14px; }
    .btn-ghost {
      padding: 13px 18px;
      border: 1px solid var(--line-2);
      background: transparent;
      color: var(--text-soft);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 200ms, color 200ms, background-color 200ms;
    }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: rgba(244, 128, 3, 0.05); }
    .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Toast / status ─────────────────────────────────────── */
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      margin-bottom: 18px;
      display: none;
      line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
      border-left: 3px solid var(--error);
      background: rgba(255, 90, 90, 0.08);
      color: var(--error);
    }
    .msg.show { display: block; }
    .msg.warn {
      background: rgba(244, 128, 3, 0.08);
      color: var(--accent);
      border-left-color: var(--accent);
    }
    .msg.warn a { color: var(--accent); font-weight: 600; text-decoration: underline; }
    .msg.warn a:hover { color: var(--accent-2); }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 12px 18px;
      background: var(--surface-2);
      border: 1px solid var(--accent-soft);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.88rem;
      box-shadow: 0 12px 30px -10px rgba(0,0,0,0.55);
      z-index: 70;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 200ms, transform 200ms;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { border-color: rgba(74, 222, 128, 0.4); }
    .toast.error { border-color: rgba(255, 90, 90, 0.4); }

    /* ── Loading skeleton ───────────────────────────────────── */
    .skeleton {
      display: inline-block;
      min-width: 120px;
      height: 1em;
      border-radius: 3px;
      background: var(--line-2);
      color: transparent;
      animation: pulseFade 1.4s ease-in-out infinite;
    }
    @keyframes pulseFade { 0%, 100% { opacity: 0.35; } 50% { opacity: 0.75; } }
    .missing-id { padding: 40px; text-align: center; font-family: 'Inter', sans-serif; color: var(--text-soft); }
    .missing-id a { color: var(--accent); font-weight: 600; }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: relative; top: 0; max-height: none; border-right: none; border-bottom: 1px solid var(--line-2); }
      .main { padding: 24px 20px 50px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── Phase-1 habit loop primitives ────────────────────────────── */
    /* Floating "+25 XP" burst that rises from the Complete button. */
    .xp-float {
      position: fixed;
      left: 0; top: 0;
      pointer-events: none;
      z-index: 90;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: var(--ok, #15c7bc);
      text-shadow: 0 0 18px rgba(21, 199, 188, 0.55);
      opacity: 0;
      transform: translate3d(0, 0, 0);
      will-change: transform, opacity;
      animation: xpFloatKf 1100ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }
    @keyframes xpFloatKf {
      0%   { opacity: 0; transform: translate3d(0, 12px, 0) scale(0.8); }
      12%  { opacity: 1; transform: translate3d(0, -4px, 0) scale(1.05); }
      70%  { opacity: 1; transform: translate3d(0, -46px, 0) scale(1); }
      100% { opacity: 0; transform: translate3d(0, -80px, 0) scale(0.92); }
    }

    /* Session-closure overlay — appears after a lesson is marked done. */
    .session-back {
      position: fixed; inset: 0;
      z-index: 95;
      background: rgba(5, 5, 20, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; visibility: hidden;
      transition: opacity 260ms cubic-bezier(0.2, 0.8, 0.2, 1), visibility 260ms;
    }
    .session-back.show { opacity: 1; visibility: visible; }
    .session-modal {
      position: relative;
      max-width: 440px;
      width: 100%;
      background: linear-gradient(180deg, rgba(14, 14, 44, 0.95), rgba(20, 20, 58, 0.9));
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 36px 32px 26px;
      text-align: center;
      transform: translate3d(0, 14px, 0) scale(0.96);
      transition: transform 340ms cubic-bezier(0.18, 0.9, 0.3, 1.2);
    }
    .session-back.show .session-modal { transform: translate3d(0, 0, 0) scale(1); }
    .session-modal .icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: rgba(21, 199, 188, 0.14);
      border: 2px solid var(--ok, #15c7bc);
      display: inline-flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }
    .session-modal .icon svg {
      width: 32px; height: 32px;
      stroke: var(--ok, #15c7bc); fill: none;
      stroke-width: 3; stroke-linecap: round; stroke-linejoin: round;
    }
    .session-modal h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }
    .session-modal .subtitle {
      color: var(--text-muted, rgba(245,245,250,0.45));
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }
    .session-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .session-stats .stat {
      display: flex; flex-direction: column; gap: 2px;
    }
    .session-stats .stat-value {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--text, #f5f5fa);
    }
    .session-stats .stat-value.accent { color: var(--accent, #f48003); }
    .session-stats .stat-value.teal { color: var(--ok, #15c7bc); }
    .session-stats .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted, rgba(245,245,250,0.45));
    }
    .session-cta {
      display: inline-block;
      width: 100%;
      padding: 14px 18px;
      border-radius: 10px;
      background: var(--accent, #f48003);
      color: #0a0a14;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background-color 200ms ease, transform 180ms ease;
    }
    .session-cta:hover { background: var(--accent-2, #ff9a2e); transform: translate3d(0, -1px, 0); }
    .session-skip {
      display: inline-block;
      margin-top: 10px;
      background: none; border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted, rgba(245,245,250,0.45));
      text-decoration: underline;
      cursor: pointer;
    }
    .session-modal .streak-line {
      color: var(--accent, #f48003);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      margin-top: 14px;
    }

    /* Level-up full-screen celebration — takes priority over session
       closure when the user crossed a level boundary on this action. */
    .levelup-back {
      position: fixed; inset: 0;
      z-index: 100;
      background: radial-gradient(circle at 50% 50%, rgba(244, 128, 3, 0.32), rgba(5, 5, 20, 0.92));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: opacity 300ms cubic-bezier(0.2, 0.8, 0.2, 1), visibility 300ms;
    }
    .levelup-back.show { opacity: 1; visibility: visible; }
    .levelup {
      text-align: center;
      transform: scale(0.5);
      opacity: 0;
      transition: transform 520ms cubic-bezier(0.18, 0.9, 0.3, 1.2), opacity 320ms;
    }
    .levelup-back.show .levelup { transform: scale(1); opacity: 1; }
    .levelup .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent, #f48003);
      margin-bottom: 14px;
    }
    .levelup .number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(5rem, 18vw, 10rem);
      font-weight: 800;
      line-height: 1;
      color: var(--text, #f5f5fa);
      letter-spacing: -0.04em;
      text-shadow: 0 14px 44px rgba(244, 128, 3, 0.6);
    }
    .levelup .sub {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      margin-top: 12px;
    }
    .levelup .sub .accent { color: var(--accent, #f48003); }
    .levelup .tap {
      margin-top: 28px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted, rgba(245,245,250,0.45));
    }
  </style>
  <script>
    api.requireAuth();
  </script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <style>.skip-link{position:absolute;left:-9999px;top:8px;z-index:99999;background:#f48003;color:#0a0a14;padding:10px 18px;border-radius:8px;font-family:system-ui,sans-serif;font-weight:700;font-size:.8rem;text-decoration:none}.skip-link:focus{left:12px}</style>

  <header class="navbar">
    <a href="dashboard.html" class="brand" aria-label="ENE — back to dashboard">
      <img src="assets/logo.png" alt="ENE — Engineering New Era">
    </a>
    <span id="crumbCourse" hidden></span>
    <div class="nav-spacer"></div>
    <a href="dashboard.html" class="back-link">← Back to dashboard</a>
  </header>

  <div class="layout">

    <!-- Sidebar: course meta + lessons list -->
    <aside class="sidebar" aria-label="Course lessons">
      <div class="course-meta-box">
        <div class="course-cat" id="courseCat">Loading…</div>
        <h2 class="course-name skeleton" id="courseName">Loading course</h2>
        <p class="course-instructor-side skeleton" id="courseInstructor">Instructor</p>
        <div class="progress-summary">
          <span><strong id="progressPct">0%</strong> complete</span>
          <span id="progressCount">0 / 0 lessons</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </div>

      <div class="lesson-section-label">Lessons</div>
      <ul class="lesson-list" id="lessonList" aria-live="polite">
        <li class="lesson-row"><span class="lesson-check"></span><span class="lesson-text"><span class="lesson-title skeleton">Loading lessons…</span></span></li>
      </ul>
    </aside>

    <!-- Main lesson view -->
    <main class="main" id="main-content" tabindex="-1">
      <div id="msg" class="msg" role="alert" aria-live="polite"></div>

      <div class="lesson-header">
        <div>
          <div class="lesson-eyebrow" id="lessonEyebrow">Lesson</div>
          <h1 class="lesson-h1 skeleton" id="lessonTitle">Select a lesson</h1>
          <p class="lesson-sub" id="lessonSub">Pick any lesson from the list to begin.</p>
        </div>
      </div>

      <div class="video-wrap" id="videoWrap">
        <div class="video-placeholder" id="videoPlaceholder">
          <span class="play-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
          </span>
          <span>Select a lesson to start</span>
        </div>
      </div>

      <section class="content-card" id="contentCard">
        <h2>Lesson notes</h2>
        <div class="lesson-content" id="lessonContent"><em>Lesson content will appear here.</em></div>
      </section>

      <div class="actions-row">
        <button type="button" class="btn-primary" id="completeBtn" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Mark as complete
        </button>
        <button type="button" class="btn-ghost" id="prevBtn" disabled>← Previous</button>
        <button type="button" class="btn-ghost" id="nextBtn" disabled>Next →</button>
      </div>
    </main>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const courseId = params.get('id');

    let course = null;
    let lessons = [];
    let completedSet = new Set();
    let activeIdx = -1;

    if (!courseId) {
      document.body.innerHTML = '<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;"><section style="position:relative;max-width:460px;width:100%;background:linear-gradient(180deg,#0e0e2c,#14143a);border:1px solid rgba(255,255,255,0.14);border-radius:6px;padding:48px 36px;text-align:center;"><span style="position:absolute;top:-1px;left:-1px;width:14px;height:14px;border:2px solid #f48003;border-right:none;border-bottom:none;"></span><span style="position:absolute;top:-1px;right:-1px;width:14px;height:14px;border:2px solid #f48003;border-left:none;border-bottom:none;"></span><span style="position:absolute;bottom:-1px;left:-1px;width:14px;height:14px;border:2px solid #f48003;border-right:none;border-top:none;"></span><span style="position:absolute;bottom:-1px;right:-1px;width:14px;height:14px;border:2px solid #f48003;border-left:none;border-top:none;"></span><div style="font-family:\'JetBrains Mono\',monospace;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:#ff7a7a;margin-bottom:14px;"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#ff7a7a;margin-right:8px;vertical-align:middle;"></span>Missing course id</div><h1 style="font-family:\'Space Grotesk\',sans-serif;font-weight:600;font-size:1.5rem;letter-spacing:-0.02em;margin-bottom:10px;color:#f5f5fa;">This lesson link is incomplete</h1><p style="color:rgba(245,245,250,0.55);font-size:.92rem;margin-bottom:24px;">Head back to your dashboard to pick a course.</p><a href="dashboard.html" style="display:inline-block;background:#f48003;color:#0a0a14;padding:13px 26px;border-radius:4px;font-family:\'JetBrains Mono\',monospace;font-weight:700;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;">Back to dashboard →</a></section></main>';
      throw new Error('No course id');
    }

    // ── Helpers ──────────────────────────────────────────────
    const $ = (id) => document.getElementById(id);
    const msg = $('msg');

    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(text, kind) {
      let el = document.getElementById('toast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'toast';
        el.className = 'toast';
        el.setAttribute('role', 'status');
        document.body.appendChild(el);
      }
      el.textContent = text;
      el.className = 'toast show ' + (kind || '');
      clearTimeout(el._hide);
      el._hide = setTimeout(() => { el.className = 'toast ' + (kind || ''); }, 2400);
    }

    /**
     * Convert common video URLs to an embeddable form.
     * Supports raw YouTube, youtu.be, Vimeo. Falls back to <video src=...>.
     */
    function renderVideo(url) {
      const wrap = $('videoWrap');
      if (!url) {
        wrap.innerHTML = `
          <div class="video-placeholder">
            <span class="play-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </span>
            <span>Video coming soon</span>
          </div>`;
        return;
      }
      // Parse + allowlist before rendering. The backend already validates
      // videoUrl, but defence-in-depth: drop anything that isn't https: and
      // on a known video host before it reaches an <iframe src=> or <video src=>.
      const ALLOWED_HOSTS = ['youtube.com', 'www.youtube.com', 'm.youtube.com',
        'youtu.be', 'vimeo.com', 'www.vimeo.com', 'player.vimeo.com'];
      let u;
      try { u = new URL(url); } catch (_) { u = null; }
      if (!u || (u.protocol !== 'https:' && u.protocol !== 'http:') ||
          !ALLOWED_HOSTS.includes(u.hostname)) {
        wrap.innerHTML = `
          <div class="video-placeholder">
            <span>Video unavailable</span>
          </div>`;
        return;
      }

      let embed = u.href;
      if (u.hostname.includes('youtube.com')) {
        const v = u.searchParams.get('v');
        if (v) embed = `https://www.youtube.com/embed/${encodeURIComponent(v)}`;
      } else if (u.hostname === 'youtu.be') {
        const id = u.pathname.replace(/^\//, '');
        if (id) embed = `https://www.youtube.com/embed/${encodeURIComponent(id)}`;
      } else if (u.hostname.includes('vimeo.com')) {
        const id = u.pathname.split('/').filter(Boolean)[0];
        if (id) embed = `https://player.vimeo.com/video/${encodeURIComponent(id)}`;
      }

      const isFile = /\.(mp4|webm|ogg|mov)(\?|$)/i.test(embed);
      if (isFile) {
        wrap.innerHTML = `<video src="${escapeHtml(embed)}" controls preload="metadata"></video>`;
      } else {
        // IMPORTANT: `allow-scripts allow-same-origin` in combination lets the
        // iframe escape the sandbox against our origin. This is acceptable
        // ONLY because the src is locked to the ALLOWED_HOSTS list above
        // (YouTube + Vimeo). If you ever add a host to that list, verify
        // the host is trustworthy enough to run inside our security context.
        // Never allow user-submitted video hosts without revisiting this.
        wrap.innerHTML = `<iframe src="${escapeHtml(embed)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen sandbox="allow-scripts allow-same-origin allow-presentation"></iframe>`;
      }
    }

    function renderLessonList() {
      const list = $('lessonList');
      if (!lessons.length) {
        list.innerHTML = `<li class="lesson-row"><span class="lesson-check"></span><span class="lesson-text">No lessons in this course yet.</span></li>`;
        return;
      }
      list.innerHTML = lessons.map((l, i) => {
        const done = completedSet.has(l._id);
        const active = i === activeIdx;
        const cls = ['lesson-row'];
        if (done) cls.push('completed');
        if (active) cls.push('active');
        return `
          <li class="${cls.join(' ')}" data-idx="${i}" role="button" tabindex="0">
            <span class="lesson-check" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </span>
            <span class="lesson-text">
              <span class="lesson-title">${escapeHtml(`${i + 1}. ${l.title}`)}</span>
            </span>
            <span class="lesson-meta">${escapeHtml(l.duration || '')}</span>
          </li>`;
      }).join('');
    }

    function selectLesson(i) {
      if (i < 0 || i >= lessons.length) return;
      activeIdx = i;
      const l = lessons[i];
      $('lessonEyebrow').textContent = `Lesson ${i + 1} of ${lessons.length}`;
      const titleEl = $('lessonTitle');
      titleEl.textContent = l.title;
      titleEl.classList.remove('skeleton');
      $('lessonSub').textContent = l.duration ? `${l.duration} · ${course.title}` : course.title;
      const contentEl = $('lessonContent');
      contentEl.innerHTML = l.content ? escapeHtml(l.content) : '<em>No notes for this lesson yet.</em>';
      renderVideo(l.videoUrl);

      // Buttons
      const completed = completedSet.has(l._id);
      const btn = $('completeBtn');
      btn.disabled = false;
      if (completed) {
        btn.classList.add('completed');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Completed — click to undo';
      } else {
        btn.classList.remove('completed');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Mark as complete';
      }
      $('prevBtn').disabled = i === 0;
      $('nextBtn').disabled = i === lessons.length - 1;

      renderLessonList();

      // Update URL hash so refresh keeps the active lesson
      history.replaceState(null, '', `?id=${courseId}#${l._id}`);
    }

    function updateProgressUI(pct, count, total) {
      $('progressPct').textContent = `${pct}%`;
      $('progressCount').textContent = `${count} / ${total} lessons`;
      requestAnimationFrame(() => { $('progressFill').style.width = pct + '%'; });
    }

    /**
     * Spawn a floating "+N XP" burst at the given screen position.
     * Removes itself when the animation finishes — zero leaks.
     */
    function spawnXpFloat(x, y, xpAmount) {
      if (!xpAmount || xpAmount <= 0) return;
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const el = document.createElement('div');
      el.className = 'xp-float';
      el.textContent = '+' + xpAmount + ' XP';
      el.style.left = (x - 40) + 'px';
      el.style.top  = (y - 20) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove(), { once: true });
    }

    /**
     * Show the level-up takeover. One click / Escape / 3s auto-dismiss.
     * Built lazily so the DOM stays clean for users who never level up.
     */
    function showLevelUp(newLevel) {
      let back = document.getElementById('levelupBack');
      if (!back) {
        back = document.createElement('div');
        back.id = 'levelupBack';
        back.className = 'levelup-back';
        back.innerHTML =
          '<div class="levelup">' +
            '<div class="eyebrow">Level up</div>' +
            '<div class="number" id="levelupNumber">—</div>' +
            '<div class="sub">You reached <span class="accent" id="levelupAccent">Level —</span></div>' +
            '<div class="tap">Tap anywhere to continue</div>' +
          '</div>';
        document.body.appendChild(back);
        const close = () => back.classList.remove('show');
        back.addEventListener('click', close);
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && back.classList.contains('show')) close();
        });
      }
      document.getElementById('levelupNumber').textContent = newLevel;
      document.getElementById('levelupAccent').textContent = 'Level ' + newLevel;
      requestAnimationFrame(() => back.classList.add('show'));
      // Auto-dismiss after 3.2s so the user isn't trapped. If the session
      // closure needs to follow, it queues behind this.
      setTimeout(() => back.classList.remove('show'), 3200);
    }

    /**
     * Session closure — shown after a lesson completes. Anchors the
     * user in their progress + nudges the return ("come back tomorrow").
     */
    function showSessionClosure(state, courseTitle, progressPct, nextLessonIdx) {
      let back = document.getElementById('sessionBack');
      if (!back) {
        back = document.createElement('div');
        back.id = 'sessionBack';
        back.className = 'session-back';
        back.innerHTML =
          '<div class="session-modal">' +
            '<div class="icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12l5 5 11-11"/></svg></div>' +
            '<h2 id="scTitle">Lesson complete</h2>' +
            '<div class="subtitle" id="scSubtitle">—</div>' +
            '<div class="session-stats">' +
              '<div class="stat"><span class="stat-value teal" id="scXp">—</span><span class="stat-label">XP gained</span></div>' +
              '<div class="stat"><span class="stat-value accent" id="scStreak">—</span><span class="stat-label">Day streak</span></div>' +
              '<div class="stat"><span class="stat-value" id="scPct">—</span><span class="stat-label">Course progress</span></div>' +
            '</div>' +
            '<button type="button" class="session-cta" id="scCta">—</button>' +
            '<div class="streak-line" id="scStreakLine" hidden></div>' +
            '<button type="button" class="session-skip" id="scSkip">Close</button>' +
          '</div>';
        document.body.appendChild(back);
        back.addEventListener('click', (e) => {
          if (e.target === back) back.classList.remove('show');
        });
        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && back.classList.contains('show')) back.classList.remove('show');
        });
      }
      document.getElementById('scTitle').textContent = state.courseCompleted
        ? "You've finished the course"
        : 'Lesson complete';
      document.getElementById('scSubtitle').textContent = courseTitle || '';
      document.getElementById('scXp').textContent = '+' + (state.xpDelta || 0);
      document.getElementById('scStreak').textContent = (state.streakDays || 0);
      document.getElementById('scPct').textContent = (progressPct || 0) + '%';

      const streakLine = document.getElementById('scStreakLine');
      if (state.streakDays >= 2) {
        streakLine.textContent = state.freezeUsed
          ? '🔥 Streak freeze saved yesterday — keep it going'
          : '🔥 Come back tomorrow to keep your ' + state.streakDays + '-day streak';
        streakLine.hidden = false;
      } else {
        streakLine.hidden = true;
      }

      const cta = document.getElementById('scCta');
      // Next lesson? Primary CTA = advance. Else go back to dashboard.
      if (nextLessonIdx !== null && nextLessonIdx !== undefined && nextLessonIdx < lessons.length) {
        cta.textContent = 'Start next lesson →';
        cta.onclick = () => {
          back.classList.remove('show');
          selectLesson(nextLessonIdx);
        };
      } else {
        cta.textContent = 'Back to dashboard →';
        cta.onclick = () => { window.location.href = 'dashboard.html'; };
      }
      document.getElementById('scSkip').onclick = () => back.classList.remove('show');

      requestAnimationFrame(() => back.classList.add('show'));
    }

    async function toggleComplete() {
      const l = lessons[activeIdx];
      if (!l) return;
      const wasComplete = completedSet.has(l._id);
      const path = `/lessons/${l._id}/${wasComplete ? 'uncomplete' : 'complete'}`;
      const btn = $('completeBtn');
      btn.disabled = true;
      try {
        const { ok, status, body: data } = await api.post(path);
        if (status === 401) {
          window.location.href = 'login.html';
          return;
        }
        if (status === 403) {
          showToast('Enroll in this course first', 'error');
          btn.disabled = false;
          return;
        }
        if (!ok || !data.success) {
          showToast((data && data.message) || 'Could not update progress', 'error');
          btn.disabled = false;
          return;
        }
        if (wasComplete) {
          completedSet.delete(l._id);
        } else {
          completedSet.add(l._id);
        }
        const total = lessons.length;
        const count = completedSet.size;
        updateProgressUI(data.data.progress, count, total);

        // ── Phase-1 habit loop feedback ──────────────────────────
        // `data.data.gamification` carries the award result. Only
        // present on a fresh completion (not on mark-incomplete or
        // re-complete), so we check existence before animating.
        const gstate = data.data.gamification;
        if (gstate && !wasComplete) {
          // Floating +XP burst from the Complete button.
          const r = btn.getBoundingClientRect();
          spawnXpFloat(r.left + r.width / 2, r.top + r.height / 2 - 12, gstate.xpDelta);

          // Sequence: level-up screen first (if any) → session closure.
          const progressPct = Math.round(data.data.progress || 0);
          const nextIdx = lessons.findIndex((ls, i) => i > activeIdx && !completedSet.has(ls._id));

          if (gstate.leveledUp) {
            showLevelUp(gstate.level);
            // Queue the closure 1.8s later so it lands after the user
            // has read the level-up number.
            setTimeout(() => showSessionClosure(gstate, course && course.title, progressPct, nextIdx), 1800);
          } else {
            showSessionClosure(gstate, course && course.title, progressPct, nextIdx);
          }

          // Analytics hook.
          if (window.eneAnalytics) {
            window.eneAnalytics.track('lesson_completed', {
              courseId: courseId,
              lessonId: l._id,
              xpDelta: gstate.xpDelta,
              streakDays: gstate.streakDays,
              leveledUp: !!gstate.leveledUp,
              courseCompleted: !!gstate.courseCompleted,
            });
          }
        } else {
          showToast(wasComplete ? 'Marked as not done' : 'Lesson complete', 'success');
        }

        selectLesson(activeIdx);
      } catch (err) {
        showToast("Couldn't save your progress — try again", 'error');
        btn.disabled = false;
      }
    }

    // ── Init: fetch course + lessons + my-courses (for completed set) ──
    (async () => {
      try {
        const [courseRes, lessonsRes, myRes] = await Promise.all([
          api.get('/courses/' + courseId),
          api.get('/courses/' + courseId + '/lessons'),
          api.get('/my-courses'),
        ]);

        if (myRes.status === 401) {
          window.location.href = 'login.html';
          return;
        }
        if (courseRes.status === 404) {
          msg.textContent = 'Course not found.';
          msg.className = 'msg show';
          return;
        }

        course = (courseRes.body && courseRes.body.data) || null;
        lessons = (lessonsRes.body && lessonsRes.body.data) || [];
        const myData = myRes.body;

        // Build the completed-lessons set + enrollment for this course
        const enrollment = (myData.data || []).find(
          (e) => e.course && e.course._id === course._id
        );
        if (enrollment) {
          completedSet = new Set(enrollment.completedLessons || []);
          updateProgressUI(enrollment.progress || 0, completedSet.size, lessons.length);
        } else {
          // Not enrolled — the learning page isn't the right surface.
          // Bounce to the sales/landing page so they can convert.
          window.location.replace('course-landing.html?id=' + encodeURIComponent(courseId));
          return;
        }

        // Sidebar header
        $('crumbCourse').textContent = course.title;
        $('crumbCourse').classList.remove('skeleton');
        $('courseCat').textContent = course.category || 'Course';
        const nameEl = $('courseName');
        nameEl.textContent = course.title;
        nameEl.classList.remove('skeleton');
        const insEl = $('courseInstructor');
        insEl.textContent = `with ${course.instructor}`;
        insEl.classList.remove('skeleton');

        renderLessonList();

        // Restore active lesson from #hash if present
        const hash = window.location.hash.replace('#', '');
        const startIdx = Math.max(0, lessons.findIndex((l) => l._id === hash));
        if (lessons.length) selectLesson(startIdx === -1 ? 0 : startIdx);
        else {
          $('lessonTitle').textContent = course.title;
          $('lessonTitle').classList.remove('skeleton');
          $('lessonSub').textContent = 'No lessons published yet for this course.';
          $('lessonEyebrow').textContent = course.category || 'Course';
        }
      } catch (err) {
        msg.textContent = "We can't load this course right now. Please refresh or try again shortly.";
        msg.className = 'msg show';
      }
    })();

    // ── Wire up click handlers ────────────────────────────────
    $('lessonList').addEventListener('click', (e) => {
      const row = e.target.closest('.lesson-row[data-idx]');
      if (!row) return;
      selectLesson(Number(row.dataset.idx));
    });
    $('lessonList').addEventListener('keydown', (e) => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const row = e.target.closest('.lesson-row[data-idx]');
      if (!row) return;
      e.preventDefault();
      selectLesson(Number(row.dataset.idx));
    });
    $('completeBtn').addEventListener('click', toggleComplete);
    $('prevBtn').addEventListener('click', () => selectLesson(activeIdx - 1));
    $('nextBtn').addEventListener('click', () => selectLesson(activeIdx + 1));
  </script>
</body>
</html>
