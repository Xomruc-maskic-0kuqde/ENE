<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Verify email — ENE</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f48003'/%3E%3Ctext x='50%25' y='54%25' font-family='-apple-system,Inter,sans-serif' font-size='34' font-weight='800' text-anchor='middle' dominant-baseline='middle' fill='%230a0a14'%3EE%3C/text%3E%3C/svg%3E">
  <script src="assets/config.js?v=1776533472"></script>
  <script src="assets/api.js?v=1776533472"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css?v=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-0: #050514; --bg-1: #08081f;
      --surface: #0e0e2c; --surface-2: #14143a;
      --line-2: rgba(255, 255, 255, 0.14);
      --accent: #f48003; --accent-2: #ff9a2e;
      --text: #f5f5fa; --text-muted: rgba(245, 245, 250, 0.55);
      --error: #ff7a7a; --ok: #15c7bc;
    }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(900px 500px at 85% -5%, rgba(244, 128, 3, 0.10), transparent 60%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    h1 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; font-size: 1.5rem; margin-bottom: 10px; }
    .card {
      position: relative; width: 100%; max-width: 440px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line-2); border-radius: 6px;
      padding: 48px 36px 36px;
      text-align: center;
    }
    .card > span.br {
      position: absolute; width: 14px; height: 14px;
      border: 2px solid var(--accent); pointer-events: none;
    }
    .br-tl { top:-1px; left:-1px; border-right:none; border-bottom:none; }
    .br-tr { top:-1px; right:-1px; border-left:none; border-bottom:none; }
    .br-bl { bottom:-1px; left:-1px; border-right:none; border-top:none; }
    .br-br { bottom:-1px; right:-1px; border-left:none; border-top:none; }
    .state {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 20px;
    }
    .state .dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); margin-right: 8px; vertical-align: middle;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .35; } }
    .state.ok .dot  { background: var(--ok);    box-shadow: 0 0 10px var(--ok); }
    .state.err .dot { background: var(--error); box-shadow: 0 0 10px var(--error); animation: none; }
    .state.ok  { color: var(--ok); }
    .state.err { color: var(--error); }
    p.desc { color: var(--text-muted); font-size: .9rem; margin-bottom: 24px; }
    a.primary {
      display: inline-block;
      background: var(--accent); color: #0a0a14;
      padding: 13px 26px; border-radius: 4px; font-weight: 700; font-size: .82rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.16em; text-transform: uppercase;
      text-decoration: none;
    }
    a.primary:hover { background: var(--accent-2); }
    .skip-link{position:absolute;left:-9999px;top:8px;z-index:99999;background:#f48003;color:#0a0a14;padding:10px 18px;border-radius:8px;font-family:system-ui,sans-serif;font-weight:700;font-size:.8rem;text-decoration:none}
    .skip-link:focus{left:12px}
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <main class="card" id="main-content" tabindex="-1">
    <span class="br br-tl" aria-hidden="true"></span>
    <span class="br br-tr" aria-hidden="true"></span>
    <span class="br br-bl" aria-hidden="true"></span>
    <span class="br br-br" aria-hidden="true"></span>

    <div class="state" id="state" aria-live="polite"><span class="dot"></span><span id="stateLabel">Verifying…</span></div>
    <h1 id="title">Checking your link</h1>
    <p class="desc" id="desc">Hang on a moment while we confirm your email.</p>
    <a class="primary" id="cta" href="dashboard.html" style="display:none">Continue →</a>
  </main>

  <script>
    (async function () {
      const state = document.getElementById('state');
      const label = document.getElementById('stateLabel');
      const title = document.getElementById('title');
      const desc  = document.getElementById('desc');
      const cta   = document.getElementById('cta');
      const token = new URLSearchParams(location.search).get('token') || '';

      if (!token) {
        state.className = 'state err';
        label.textContent = 'Missing token';
        title.textContent = 'This link is incomplete';
        desc.textContent = 'Ask for a new verification email from your account settings.';
        cta.href = 'dashboard.html'; cta.textContent = 'Go to dashboard →';
        cta.style.display = 'inline-block';
        return;
      }

      try {
        const { ok, body } = await api.post('/auth/verify-email', { token });
        if (ok) {
          state.className = 'state ok';
          label.textContent = 'Verified';
          title.textContent = 'Your email is verified';
          desc.textContent = 'Thanks for confirming. You can head back to your dashboard.';
          cta.href = 'dashboard.html'; cta.textContent = 'Continue →';
        } else {
          throw new Error((body && body.message) || 'Verification failed');
        }
      } catch (err) {
        state.className = 'state err';
        label.textContent = 'Link invalid';
        title.textContent = 'We could not verify your email';
        desc.textContent = (err && err.message) || 'The link is invalid or has expired. Request a new one from your account settings.';
        cta.href = 'dashboard.html'; cta.textContent = 'Go to dashboard →';
      } finally {
        cta.style.display = 'inline-block';
      }
    })();
  </script>
</body>
</html>
