<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Create account — ENE</title>
  <meta name="description" content="Create your ENE account. Start free — every track includes a free preview lesson, no card required.">
  <meta property="og:title" content="Create your ENE account">
  <meta property="og:description" content="Start free. Every track includes a free preview lesson.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="assets/og-cover.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23f48003'/%3E%3Ctext x='50%25' y='54%25' font-family='-apple-system,Inter,sans-serif' font-size='34' font-weight='800' text-anchor='middle' dominant-baseline='middle' fill='%230a0a14'%3EE%3C/text%3E%3C/svg%3E">
  <script src="assets/config.js?v=1776533472"></script>
  <script src="assets/sanitize.js?v=1776533472"></script>
  <script src="assets/api.js?v=1776533472"></script>
  <script src="assets/patterns.js?v=1776533472"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/tokens.css?v=1">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-0: #050514;
      --bg-1: #08081f;
      --surface: #0e0e2c;
      --surface-2: #14143a;
      --line: rgba(255, 255, 255, 0.07);
      --line-2: rgba(255, 255, 255, 0.14);
      --accent: #f48003;
      --accent-2: #ff9a2e;
      --accent-soft: rgba(244, 128, 3, 0.18);
      --text: #f5f5fa;
      --text-soft: rgba(245, 245, 250, 0.72);
      --text-muted: rgba(245, 245, 250, 0.45);
      --error: #ff7a7a;
      --ok: #15c7bc;
    }
    html { color-scheme: dark; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-0);
      background-image:
        radial-gradient(900px 500px at 85% -5%, rgba(244, 128, 3, 0.10), transparent 60%),
        radial-gradient(900px 600px at -10% 110%, rgba(50, 50, 200, 0.14), transparent 60%),
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      background-size: auto, auto, 56px 56px, 56px 56px, auto;
      background-position: 0 0, 0 0, -1px -1px, -1px -1px, 0 0;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    h1 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }

    .card {
      position: relative;
      width: 100%;
      max-width: 440px;
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--line-2);
      border-radius: 6px;
      padding: 44px 36px 32px;
      box-shadow:
        0 30px 80px -30px rgba(0, 0, 0, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
      animation: lift 600ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    .card > .br-tl,
    .card > .br-tr,
    .card > .br-bl,
    .card > .br-br {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent);
      pointer-events: none;
    }
    .br-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .br-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .br-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .br-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }

    .strip {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 28px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--line-2);
    }
    .strip .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 8px;
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .logo {
      width: 160px;
      display: block;
      margin: 0 auto 22px;
      filter: drop-shadow(0 14px 32px rgba(244, 128, 3, 0.38)) drop-shadow(0 2px 4px rgba(0, 0, 0, 0.4));
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      margin-bottom: 4px;
      text-align: center;
    }
    .sub {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 28px;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    form { display: flex; flex-direction: column; gap: 18px; }
    .field { position: relative; }
    label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-soft);
      margin-bottom: 8px;
      display: block;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    label::before { content: "[ "; color: var(--accent); }
    label::after { content: " ]"; color: var(--accent); }

    input {
      width: 100%;
      padding: 12px 0 11px;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line-2);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    input::placeholder { color: var(--text-muted); }
    input:hover { border-bottom-color: rgba(255, 255, 255, 0.28); }
    input:focus {
      outline: none;
      border-bottom-color: var(--accent);
      box-shadow: 0 1px 0 0 var(--accent);
    }
    input[type="password"] { padding-right: 40px; }

    .toggle {
      position: absolute;
      right: 0;
      bottom: 4px;
      width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 150ms ease;
    }
    .toggle:hover { color: var(--accent); }
    .toggle:focus-visible {
      outline: none;
      color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
      border-radius: 4px;
    }
    .toggle svg { width: 18px; height: 18px; }

    .hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    .caps {
      display: none;
      margin-top: 8px;
      padding: 6px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #ffd59e;
      background: rgba(244, 128, 3, 0.10);
      border-left: 2px solid var(--accent);
      border-radius: 2px;
    }
    .caps.show { display: flex; align-items: center; gap: 8px; }
    .caps::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    button.primary {
      position: relative;
      background: var(--accent);
      color: #0a0a14;
      border: none;
      padding: 14px;
      border-radius: 4px;
      font-weight: 700;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 14px;
      transition: background-color 200ms ease, transform 120ms ease, box-shadow 200ms ease;
      box-shadow: 0 0 0 1px var(--accent), 0 8px 24px -10px var(--accent-soft);
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-2);
      box-shadow: 0 0 0 1px var(--accent-2), 0 14px 28px -10px rgba(244, 128, 3, 0.55);
    }
    button.primary:active:not(:disabled) { transform: translateY(1px); }
    button.primary:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px #0a0a14, 0 0 0 4px var(--accent);
    }
    button.primary:disabled { opacity: 0.55; cursor: not-allowed; }

    .msg {
      padding: 11px 13px;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      line-height: 1.5;
      font-family: 'JetBrains Mono', monospace;
      border-left: 3px solid transparent;
    }
    .msg.show { display: block; }
    .msg.error {
      background: rgba(255, 90, 90, 0.08);
      border-left-color: var(--error);
      color: var(--error);
    }
    .msg.ok {
      background: rgba(21, 199, 188, 0.08);
      border-left-color: var(--ok);
      color: var(--ok);
    }
    /* Inline recovery link rendered when the server says "email taken".
       One-tap bridge to login.html with the email pre-filled. */
    .msg .dup-recovery { margin-top: 8px; }
    .msg .dup-recovery a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: underline;
    }

    .alt {
      text-align: center;
      margin-top: 26px;
      padding-top: 18px;
      border-top: 1px dashed var(--line-2);
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .alt a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      border-bottom: 1px solid transparent;
      transition: border-color 150ms ease, color 150ms ease;
    }
    .alt a:hover { color: var(--accent-2); border-bottom-color: var(--accent-2); }
    .alt a:focus-visible {
      outline: none;
      color: var(--accent-2);
      box-shadow: 0 0 0 2px var(--accent-soft);
      border-radius: 2px;
    }

    @keyframes lift {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <style>.skip-link{position:absolute;left:-9999px;top:8px;z-index:99999;background:#f48003;color:#0a0a14;padding:10px 18px;border-radius:8px;font-family:system-ui,sans-serif;font-weight:700;font-size:.8rem;text-decoration:none}.skip-link:focus{left:12px}</style>
  <main class="card" id="main-content" tabindex="-1">
    <span class="br-tl" aria-hidden="true"></span>
    <span class="br-tr" aria-hidden="true"></span>
    <span class="br-bl" aria-hidden="true"></span>
    <span class="br-br" aria-hidden="true"></span>

    <div class="strip">
      <span><span class="dot"></span>ENE / Register</span>
      <span>v1.0</span>
    </div>

    <img src="assets/logo.png" alt="ENE — Engineering New Era" class="logo">
    <h1>Create account</h1>
    <p class="sub">Engineering New Era</p>

    <div id="msg" class="msg" role="alert" aria-live="polite"></div>

    <form id="form" novalidate>
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" autocomplete="name" required minlength="2" maxlength="50" spellcheck="false" data-sanitize="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="email" inputmode="email" maxlength="254" spellcheck="false" required data-sanitize="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="128" aria-describedby="pwHint" />
        <button type="button" class="toggle" id="togglePw" aria-label="Show password" aria-pressed="false">
          <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <p class="hint" id="pwHint">Min. 8 characters · avoid common passwords</p>
        <div class="caps" id="capsWarn" role="status" aria-live="polite">Caps Lock is on</div>
      </div>
      <button type="submit" class="primary" id="btn">Create account</button>
    </form>

    <p class="alt">Already registered? <a href="login.html">Sign in →</a></p>
  </main>

  <script>
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const pw = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon = document.getElementById('eyeIcon');

    const eyeOpen = '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/>';
    const eyeOff = '<path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-6.5 0-10-7-10-7a18.5 18.5 0 0 1 4.06-5.19"/><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c6.5 0 10 7 10 7a18.5 18.5 0 0 1-3.16 4.19"/><path d="M9.5 9.5a3 3 0 0 0 4.24 4.24"/><line x1="2" y1="2" x2="22" y2="22"/>';

    togglePw.addEventListener('click', () => {
      const isPw = pw.type === 'password';
      pw.type = isPw ? 'text' : 'password';
      togglePw.setAttribute('aria-pressed', String(isPw));
      togglePw.setAttribute('aria-label', isPw ? 'Hide password' : 'Show password');
      eyeIcon.innerHTML = isPw ? eyeOff : eyeOpen;
    });

    const capsWarn = document.getElementById('capsWarn');
    function updateCaps(e) {
      if (!e.getModifierState) return;
      capsWarn.classList.toggle('show', e.getModifierState('CapsLock'));
    }
    pw.addEventListener('keydown', updateCaps);
    pw.addEventListener('keyup', updateCaps);
    pw.addEventListener('blur', () => capsWarn.classList.remove('show'));

    // All submit boilerplate delegates to Patterns.form. The one piece
    // this page needs over the generic default is a richer error
    // renderer — when the server says "email already registered", we
    // inject an inline "Sign in with <email> →" recovery link so the
    // user can recover in one tap.
    function renderRichError(errText, email, msgEl) {
      const lower = (errText || '').toLowerCase();
      const looksDuplicate =
        lower.includes('already have an account') ||
        lower.includes('already exists') ||
        lower.includes('already registered');

      msgEl.innerHTML = '';
      const line = document.createElement('div');
      line.textContent = errText;
      msgEl.appendChild(line);

      if (looksDuplicate && email) {
        const linkWrap = document.createElement('div');
        linkWrap.className = 'dup-recovery';
        const a = document.createElement('a');
        a.href = 'login.html?email=' + encodeURIComponent(email);
        a.textContent = 'Sign in with ' + email + ' →';
        linkWrap.appendChild(a);
        msgEl.appendChild(linkWrap);
      }

      msgEl.className = 'msg show error';
      msgEl.classList.remove('shake');
      void msgEl.offsetWidth;
      msgEl.classList.add('shake');
      try { msgEl.scrollIntoView({ block: 'center', behavior: 'smooth' }); } catch (_) {}
    }

    Patterns.ready(() => {
      // Mark the msg element so Patterns.form finds it automatically.
      msg.setAttribute('data-msg', '');
      const f = Patterns.form(form, {
        loadingText: 'Creating…',
        idleText: 'Create account',
        read: () => ({
          name: (document.getElementById('name').value || '').trim(),
          email: (document.getElementById('email').value || '').trim(),
          password: pw.value,
        }),
        validate: ({ name, email, password }) => {
          if (!name || name.length < 2) return 'Please enter your name (2+ characters).';
          if (!email || !/^\S+@\S+\.\S+$/.test(email)) return 'Please enter a valid email address.';
          if (!password || password.length < 8) return 'Password must be at least 8 characters.';
          return null;
        },
        submit: async ({ values }) => api.post('/auth/register', values),
        onSuccess: () => {
          msg.textContent = 'Account created. Taking you in…';
          msg.className = 'msg show ok';
          setTimeout(() => { window.location.href = 'dashboard.html'; }, 600);
        },
        onError: (err, { values }) => {
          const s = err && err.status;
          let text;
          if (s === 429)    text = 'Too many sign-ups from this network. Try again in a few minutes.';
          else if (s === 0) text = "We can't reach the service right now. Please try again in a moment.";
          else              text = (err && err.message) || 'Could not create account.';
          renderRichError(text, values.email, msg);
        },
      });
      void f;
    });
  </script>
</body>
</html>
